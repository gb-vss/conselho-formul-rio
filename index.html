<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Conselho Tutelar - Registro de Ocorrencias</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f4f8;
            padding: 20px;
            color: #1e293b;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.75rem;
            color: #0f3b5c;
            margin-bottom: 8px;
        }
        .subtitle {
            margin-bottom: 20px;
            color: #475569;
            font-size: 0.9rem;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #334155;
        }
        input, select, textarea {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            background: white;
            transition: all 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #0f3b5c;
            box-shadow: 0 0 0 3px rgba(15,59,92,0.1);
        }
        .row-2cols {
            display: flex;
            gap: 15px;
        }
        .row-2cols .form-group {
            flex: 1;
        }
        button {
            width: 100%;
            background: #0f3b5c;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #1a4d72;
        }
        button:active {
            transform: scale(0.98);
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            text-align: center;
            padding: 14px;
            border-radius: 40px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
        }
        .info-note {
            background: #fef9e3;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #92400e;
            margin-top: 12px;
            text-align: center;
        }
        @media (max-width: 480px) {
            body { padding: 12px; }
            .card { padding: 16px; }
            button { padding: 14px; }
        }
        .required-field::after {
            content: " *";
            color: #dc2626;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Conselho Tutelar</h1>
    <div class="subtitle">Registro de Ocorrencias</div>

    <div class="card">
        <form id="occurrenceForm">
            <div class="form-group">
                <label class="required-field">Data da ocorrencia</label>
                <input type="date" id="date" required>
            </div>

            <div class="form-group">
                <label class="required-field">Conselheiro responsavel</label>
                <input type="text" id="counselor" placeholder="Digite o nome completo do conselheiro" required>
            </div>

            <div class="form-group">
                <label class="required-field">Nome da crianca ou adolescente</label>
                <input type="text" id="childName" placeholder="Nome completo" required>
            </div>

            <div class="form-group">
                <label class="required-field">Nome do responsavel</label>
                <input type="text" id="guardian" placeholder="Nome do pai, mae ou responsavel legal" required>
            </div>

            <div class="row-2cols">
                <div class="form-group">
                    <label class="required-field">Idade (0-17)</label>
                    <input type="number" id="age" placeholder="0-17" min="0" max="17" required>
                </div>
                <div class="form-group">
                    <label class="required-field">Sexo</label>
                    <select id="gender" required>
                        <option value="">Selecione</option>
                        <option>Feminino</option>
                        <option>Masculino</option>
                        <option>Nao informado</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="required-field">Tipo de ocorrencia</label>
                <select id="occurrenceType" required>
                    <option value="">Selecione</option>
                    <optgroup label="Violencia">
                        <option>Violencia fisica</option>
                        <option>Violencia psicologica</option>
                        <option>Violencia sexual</option>
                        <option>Negligencia ou abandono</option>
                    </optgroup>
                    <optgroup label="Direitos">
                        <option>Trabalho infantil</option>
                        <option>Evasao escolar</option>
                        <option>Falta de vaga em escola ou creche</option>
                        <option>Recusa de tratamento medico</option>
                    </optgroup>
                    <optgroup label="Convivio familiar">
                        <option>Conflito familiar</option>
                        <option>Acolhimento</option>
                        <option>Guarda irregular</option>
                        <option>Alienacao parental</option>
                    </optgroup>
                    <optgroup label="Outros">
                        <option>Ato infracional</option>
                        <option>Uso de substancias</option>
                        <option>Pedido de acompanhamento</option>
                        <option>Denuncia anonima</option>
                    </optgroup>
                </select>
            </div>

            <div class="form-group">
                <label>Observacoes</label>
                <textarea id="notes" rows="3" placeholder="Informacoes complementares sobre a ocorrencia..."></textarea>
            </div>

            <button type="submit">Registrar ocorrencia</button>
        </form>
        <div class="info-note">
            Dados internos - Relatorios disponiveis na aba Dashboard da planilha
        </div>
    </div>
</div>
<div id="toast" class="toast">Ocorrencia registrada com sucesso!</div>

<script>
    // Configuracao com o seu NOVO ID do Apps Script
    const SCRIPT_ID = 'AKfycbw2IoDmsTGH7-u3cKZuvkTIxun2T7py5sD2S9CtxjlryFRIbVoT0GBb8LqL8PxDeMvPUg';
    const GOOGLE_SCRIPT_URL = `https://script.google.com/macros/s/${SCRIPT_ID}/exec`;

    const form = document.getElementById('occurrenceForm');
    const toast = document.getElementById('toast');

    // Preenche data atual automaticamente
    document.getElementById('date').valueAsDate = new Date();

    function showMessage(msg, isError = false) {
        toast.textContent = isError ? `Erro: ${msg}` : msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    async function submitToGoogleSheets(formData) {
        try {
            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams(formData)
            });
            return true;
        } catch (error) {
            console.error('Erro:', error);
            return false;
        }
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = {
            action: 'addRecord',
            timestamp: new Date().toISOString(),
            date: document.getElementById('date').value,
            counselor: document.getElementById('counselor').value.trim(),
            childName: document.getElementById('childName').value.trim(),
            guardian: document.getElementById('guardian').value.trim(),
            age: document.getElementById('age').value,
            gender: document.getElementById('gender').value,
            occurrenceType: document.getElementById('occurrenceType').value,
            notes: document.getElementById('notes').value.trim() || ''
        };

        // Validacao
        if (!formData.counselor) {
            showMessage('Digite o nome do conselheiro responsavel', true);
            return;
        }
        
        if (!formData.childName) {
            showMessage('Digite o nome da crianca ou adolescente', true);
            return;
        }
        
        if (!formData.guardian) {
            showMessage('Digite o nome do responsavel', true);
            return;
        }
        
        if (!formData.age || formData.age < 0 || formData.age > 17) {
            showMessage('Informe uma idade valida (0 a 17 anos)', true);
            return;
        }
        
        if (!formData.gender) {
            showMessage('Selecione o sexo', true);
            return;
        }
        
        if (!formData.occurrenceType) {
            showMessage('Selecione o tipo de ocorrencia', true);
            return;
        }

        const success = await submitToGoogleSheets(formData);
        
        if (success) {
            showMessage('Ocorrencia registrada com sucesso!');
            form.reset();
            document.getElementById('date').valueAsDate = new Date();
            document.getElementById('notes').value = '';
        } else {
            showMessage('Erro ao registrar. Verifique sua conexao.', true);
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Conselho Tutelar - Registro de Ocorrencias</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f4f8;
            padding: 20px;
            color: #1e293b;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.75rem;
            color: #0f3b5c;
            margin-bottom: 8px;
        }
        .subtitle {
            margin-bottom: 20px;
            color: #475569;
            font-size: 0.9rem;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #334155;
        }
        input, select, textarea {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            background: white;
            transition: all 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #0f3b5c;
            box-shadow: 0 0 0 3px rgba(15,59,92,0.1);
        }
        .row-2cols {
            display: flex;
            gap: 15px;
        }
        .row-2cols .form-group {
            flex: 1;
        }
        .row-3cols {
            display: flex;
            gap: 10px;
        }
        .row-3cols .form-group {
            flex: 1;
        }
        button {
            width: 100%;
            background: #0f3b5c;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #1a4d72;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-secondary {
            background: #64748b;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background: #475569;
        }
        .btn-remove {
            background: #dc2626;
            padding: 8px;
            font-size: 0.85rem;
            margin-top: 0;
        }
        .btn-remove:hover {
            background: #b91c1c;
        }
        .child-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
        }
        .child-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .child-title {
            font-weight: 600;
            color: #0f3b5c;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            text-align: center;
            padding: 14px;
            border-radius: 40px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
        }
        .info-note {
            background: #fef9e3;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #92400e;
            margin-top: 12px;
            text-align: center;
        }
        .required-field::after {
            content: " *";
            color: #dc2626;
        }
        hr {
            margin: 20px 0;
            border: none;
            border-top: 2px dashed #e2e8f0;
        }
        @media (max-width: 480px) {
            body { padding: 12px; }
            .card { padding: 16px; }
            button { padding: 14px; }
            .row-3cols {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Conselho Tutelar</h1>
    <div class="subtitle">Registro de Ocorrencias - Multiplas Criancas</div>

    <div class="card">
        <form id="occurrenceForm">
            <div class="form-group">
                <label class="required-field">Data da ocorrencia</label>
                <input type="date" id="date" required>
            </div>

            <div class="form-group">
                <label class="required-field">Conselheiro responsavel</label>
                <input type="text" id="counselor" placeholder="Digite o nome completo do conselheiro" required>
            </div>

            <div class="form-group">
                <label class="required-field">Nome do responsavel</label>
                <input type="text" id="guardian" placeholder="Nome do pai, mae ou responsavel legal" required>
            </div>

            <div class="form-group">
                <label class="required-field">Tipo de ocorrencia</label>
                <select id="occurrenceType" required>
                    <option value="">Selecione</option>
                    <optgroup label="Violencia">
                        <option>Violencia fisica</option>
                        <option>Violencia psicologica</option>
                        <option>Violencia sexual</option>
                        <option>Negligencia ou abandono</option>
                    </optgroup>
                    <optgroup label="Direitos">
                        <option>Trabalho infantil</option>
                        <option>Evasao escolar</option>
                        <option>Falta de vaga em escola ou creche</option>
                        <option>Recusa de tratamento medico</option>
                    </optgroup>
                    <optgroup label="Convivio familiar">
                        <option>Conflito familiar</option>
                        <option>Acolhimento</option>
                        <option>Guarda irregular</option>
                        <option>Alienacao parental</option>
                    </optgroup>
                    <optgroup label="Documentos e Termos">
                        <option>Declaracoes</option>
                        <option>Termo de advertencia</option>
                        <option>Termo de entrega ou responsabilidade</option>
                    </optgroup>
                    <optgroup label="Outros">
                        <option>Ato infracional</option>
                        <option>Uso de substancias</option>
                        <option>Pedido de acompanhamento</option>
                        <option>Denuncia anonima</option>
                    </optgroup>
                </select>
            </div>

            <div class="form-group">
                <label>Observacoes</label>
                <textarea id="notes" rows="3" placeholder="Informacoes complementares sobre a ocorrencia..."></textarea>
            </div>

            <hr>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <label style="margin-bottom: 0;">Criancas envolvidas</label>
                <button type="button" id="addChildBtn" class="btn-secondary" style="width: auto; padding: 8px 16px;">+ Adicionar crianca</button>
            </div>

            <div id="childrenContainer">
                <div class="child-card" data-child-index="0">
                    <div class="child-header">
                        <span class="child-title">Crianca 1</span>
                        <button type="button" class="btn-remove remove-child" style="width: auto; padding: 4px 12px;">Remover</button>
                    </div>
                    <div class="row-3cols">
                        <div class="form-group">
                            <label>Nome</label>
                            <input type="text" class="child-name" placeholder="Nome completo" required>
                        </div>
                        <div class="form-group">
                            <label>Idade (0-17)</label>
                            <input type="number" class="child-age" placeholder="Idade" min="0" max="17" required>
                        </div>
                        <div class="form-group">
                            <label>Sexo</label>
                            <select class="child-gender" required>
                                <option value="">Selecione</option>
                                <option>Feminino</option>
                                <option>Masculino</option>
                                <option>Nao informado</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <button type="submit">Registrar ocorrencia</button>
        </form>
        <div class="info-note">
            Dados internos - Relatorios disponiveis na aba Dashboard da planilha<br>
            Para multiplas criancas, clique em "Adicionar crianca"
        </div>
    </div>
</div>
<div id="toast" class="toast">Ocorrencia registrada com sucesso!</div>

<script>
    // Configuracao com o seu NOVO ID do Apps Script
    const SCRIPT_ID = 'AKfycbw_zR_hMlONozbHQHuE1AGQ3zYcfH3x2cn9qtZpgLEI7gGFTTu-3Z6xkfVQz42Ultg-EA';
    const GOOGLE_SCRIPT_URL = `https://script.google.com/macros/s/${SCRIPT_ID}/exec`;

    const form = document.getElementById('occurrenceForm');
    const toast = document.getElementById('toast');
    const childrenContainer = document.getElementById('childrenContainer');
    const addChildBtn = document.getElementById('addChildBtn');

    let childCount = 1;
    const MAX_CHILDREN = 5;

    // Preenche data atual automaticamente
    document.getElementById('date').valueAsDate = new Date();

    function showMessage(msg, isError = false) {
        toast.textContent = isError ? `Erro: ${msg}` : msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function getChildrenData() {
        const children = [];
        const childCards = document.querySelectorAll('.child-card');
        
        for (let card of childCards) {
            const name = card.querySelector('.child-name').value.trim();
            const age = card.querySelector('.child-age').value;
            const gender = card.querySelector('.child-gender').value;
            
            if (name && age && gender) {
                children.push({ name, age, gender });
            }
        }
        
        return children;
    }

    function validateChildren() {
        const children = getChildrenData();
        
        if (children.length === 0) {
            showMessage('Adicione pelo menos uma crianca', true);
            return false;
        }
        
        for (let i = 0; i < children.length; i++) {
            const child = children[i];
            if (!child.name) {
                showMessage(`Digite o nome da crianca ${i + 1}`, true);
                return false;
            }
            if (!child.age || child.age < 0 || child.age > 17) {
                showMessage(`Informe uma idade valida (0-17) para a crianca ${i + 1}`, true);
                return false;
            }
            if (!child.gender) {
                showMessage(`Selecione o sexo para a crianca ${i + 1}`, true);
                return false;
            }
        }
        
        return true;
    }

    function addChild() {
        if (childCount >= MAX_CHILDREN) {
            showMessage(`Maximo de ${MAX_CHILDREN} criancas por ocorrencia`, true);
            return;
        }
        
        const newIndex = childCount;
        const newChildCard = document.createElement('div');
        newChildCard.className = 'child-card';
        newChildCard.setAttribute('data-child-index', newIndex);
        newChildCard.innerHTML = `
            <div class="child-header">
                <span class="child-title">Crianca ${newIndex + 1}</span>
                <button type="button" class="btn-remove remove-child" style="width: auto; padding: 4px 12px;">Remover</button>
            </div>
            <div class="row-3cols">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" class="child-name" placeholder="Nome completo" required>
                </div>
                <div class="form-group">
                    <label>Idade (0-17)</label>
                    <input type="number" class="child-age" placeholder="Idade" min="0" max="17" required>
                </div>
                <div class="form-group">
                    <label>Sexo</label>
                    <select class="child-gender" required>
                        <option value="">Selecione</option>
                        <option>Feminino</option>
                        <option>Masculino</option>
                        <option>Nao informado</option>
                    </select>
                </div>
            </div>
        `;
        
        childrenContainer.appendChild(newChildCard);
        childCount++;
        
        // Adiciona evento de remover ao novo botao
        const removeBtn = newChildCard.querySelector('.remove-child');
        removeBtn.addEventListener('click', function() {
            removeChild(newChildCard);
        });
    }

    function removeChild(childCard) {
        if (document.querySelectorAll('.child-card').length <= 1) {
            showMessage('Deve haver pelo menos uma crianca no atendimento', true);
            return;
        }
        childCard.remove();
        
        // Reorganiza os indices e titulos
        const remainingCards = document.querySelectorAll('.child-card');
        for (let i = 0; i < remainingCards.length; i++) {
            const title = remainingCards[i].querySelector('.child-title');
            title.textContent = `Crianca ${i + 1}`;
        }
        childCount = remainingCards.length;
    }

    // Adiciona evento para os botoes de remover existentes
    function initRemoveButtons() {
        const removeButtons = document.querySelectorAll('.remove-child');
        removeButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                const childCard = this.closest('.child-card');
                removeChild(childCard);
            });
        });
    }

    addChildBtn.addEventListener('click', addChild);
    initRemoveButtons();

    async function submitToGoogleSheets(formData) {
        try {
            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams(formData)
            });
            return true;
        } catch (error) {
            console.error('Erro:', error);
            return false;
        }
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Validacoes basicas
        const counselor = document.getElementById('counselor').value.trim();
        const guardian = document.getElementById('guardian').value.trim();
        const occurrenceType = document.getElementById('occurrenceType').value;
        
        if (!counselor) {
            showMessage('Digite o nome do conselheiro responsavel', true);
            return;
        }
        
        if (!guardian) {
            showMessage('Digite o nome do responsavel', true);
            return;
        }
        
        if (!occurrenceType) {
            showMessage('Selecione o tipo de ocorrencia', true);
            return;
        }
        
        if (!validateChildren()) {
            return;
        }
        
        const children = getChildrenData();
        
        // Monta os dados para enviar
        const formData = {
            action: 'addRecord',
            timestamp: new Date().toISOString(),
            date: document.getElementById('date').value,
            counselor: counselor,
            guardian: guardian,
            occurrenceType: occurrenceType,
            notes: document.getElementById('notes').value.trim() || '',
            childrenCount: children.length,
            children: JSON.stringify(children)
        };
        
        // Adiciona cada crianca como campo individual
        children.forEach((child, index) => {
            formData[`child_${index}_name`] = child.name;
            formData[`child_${index}_age`] = child.age;
            formData[`child_${index}_gender`] = child.gender;
        });

        const success = await submitToGoogleSheets(formData);
        
        if (success) {
            showMessage('Ocorrencia registrada com sucesso!');
            form.reset();
            document.getElementById('date').valueAsDate = new Date();
            document.getElementById('notes').value = '';
            
            // Reseta para apenas uma crianca
            while (document.querySelectorAll('.child-card').length > 1) {
                const lastCard = document.querySelectorAll('.child-card')[document.querySelectorAll('.child-card').length - 1];
                lastCard.remove();
            }
            
            // Limpa os campos da primeira crianca
            const firstCard = document.querySelector('.child-card');
            firstCard.querySelector('.child-name').value = '';
            firstCard.querySelector('.child-age').value = '';
            firstCard.querySelector('.child-gender').value = '';
            
            childCount = 1;
        } else {
            showMessage('Erro ao registrar. Verifique sua conexao.', true);
        }
    });
</script>
</body>
</html>

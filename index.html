<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Conselho Tutelar - Registro de Ocorrencias</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f4f8;
            padding: 20px;
            color: #1e293b;
        }
        .container {
            max-width: 750px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.75rem;
            color: #0f3b5c;
            margin-bottom: 8px;
        }
        .subtitle {
            margin-bottom: 20px;
            color: #475569;
            font-size: 0.9rem;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #334155;
        }
        input, select, textarea {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            background: white;
            transition: all 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #0f3b5c;
            box-shadow: 0 0 0 3px rgba(15,59,92,0.1);
        }
        .row-2cols {
            display: flex;
            gap: 15px;
        }
        .row-2cols .form-group {
            flex: 1;
        }
        .row-3cols {
            display: flex;
            gap: 10px;
        }
        .row-3cols .form-group {
            flex: 1;
        }
        button {
            background: #0f3b5c;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #1a4d72;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
        .btn-group button {
            flex: 1;
        }
        .btn-secondary {
            background: #64748b;
        }
        .btn-secondary:hover {
            background: #475569;
        }
        .btn-pdf {
            background: #dc2626;
        }
        .btn-pdf:hover {
            background: #b91c1c;
        }
        .btn-remove {
            background: #dc2626;
            padding: 8px;
            font-size: 0.85rem;
            margin-top: 0;
            width: auto;
        }
        .child-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
        }
        .child-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .child-title {
            font-weight: 600;
            color: #0f3b5c;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            text-align: center;
            padding: 14px;
            border-radius: 40px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
        }
        .info-note {
            background: #fef9e3;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #92400e;
            margin-top: 12px;
            text-align: center;
        }
        .required-field::after {
            content: " *";
            color: #dc2626;
        }
        hr {
            margin: 20px 0;
            border: none;
            border-top: 2px dashed #e2e8f0;
        }
        @media (max-width: 480px) {
            body { padding: 12px; }
            .card { padding: 16px; }
            .btn-group { flex-direction: column; }
            .row-3cols {
                flex-direction: column;
                gap: 15px;
            }
        }
        
        /* Estilos para impressão do PDF */
        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            .card {
                box-shadow: none;
                padding: 0;
                margin: 0;
            }
            .btn-group, .info-note, .toast, .btn-secondary, .btn-pdf, button[type="submit"] {
                display: none !important;
            }
            input, select, textarea {
                border: none;
                padding: 2px 0;
                background: transparent;
            }
            .child-card {
                background: transparent;
                border: 1px solid #ccc;
                page-break-inside: avoid;
            }
            .form-group {
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Conselho Tutelar</h1>
    <div class="subtitle">Registro de Ocorrencias - Multiplas Criancas</div>

    <div class="card">
        <form id="occurrenceForm">
            <div class="form-group">
                <label class="required-field">Data da ocorrencia</label>
                <input type="date" id="date" required>
            </div>

            <div class="form-group">
                <label class="required-field">Conselheiro responsavel</label>
                <input type="text" id="counselor" placeholder="Digite o nome completo do conselheiro" required>
            </div>

            <div class="form-group">
                <label class="required-field">Nome do responsavel</label>
                <input type="text" id="guardian" placeholder="Nome do pai, mae ou responsavel legal" required>
            </div>

            <div class="form-group">
                <label>Data de nascimento do responsavel</label>
                <input type="date" id="guardianBirthDate">
            </div>

            <div class="form-group">
                <label>Endereco</label>
                <input type="text" id="address" placeholder="Rua, numero, bairro, cidade - CEP">
            </div>

            <div class="form-group">
                <label>Telefone do responsavel</label>
                <input type="tel" id="phone" placeholder="(00) 00000-0000">
            </div>

            <div class="form-group">
                <label class="required-field">Tipo de ocorrencia</label>
                <select id="occurrenceType" required>
                    <option value="">Selecione</option>
                    <optgroup label="Violencia">
                        <option>Violencia fisica</option>
                        <option>Violencia psicologica</option>
                        <option>Violencia sexual</option>
                        <option>Negligencia ou abandono</option>
                    </optgroup>
                    <optgroup label="Direitos">
                        <option>Trabalho infantil</option>
                        <option>Evasao escolar</option>
                        <option>Falta de vaga em escola ou creche</option>
                        <option>Recusa de tratamento medico</option>
                    </optgroup>
                    <optgroup label="Convivio familiar">
                        <option>Conflito familiar</option>
                        <option>Acolhimento</option>
                        <option>Guarda irregular</option>
                        <option>Alienacao parental</option>
                    </optgroup>
                    <optgroup label="Documentos e Termos">
                        <option>Declaracoes</option>
                        <option>Termo de advertencia</option>
                        <option>Termo de entrega ou responsabilidade</option>
                    </optgroup>
                    <optgroup label="Outros">
                        <option>Ato infracional</option>
                        <option>Uso de substancias</option>
                        <option>Pedido de acompanhamento</option>
                        <option>Denuncia anonima</option>
                    </optgroup>
                </select>
            </div>

            <div class="form-group">
                <label>Observacoes</label>
                <textarea id="notes" rows="3" placeholder="Informacoes complementares sobre a ocorrencia..."></textarea>
            </div>

            <hr>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <label style="margin-bottom: 0;">Criancas envolvidas</label>
                <button type="button" id="addChildBtn" class="btn-secondary" style="width: auto; padding: 8px 16px;">+ Adicionar crianca</button>
            </div>

            <div id="childrenContainer">
                <div class="child-card" data-child-index="0">
                    <div class="child-header">
                        <span class="child-title">Crianca 1</span>
                        <button type="button" class="btn-remove remove-child" style="width: auto; padding: 4px 12px;">Remover</button>
                    </div>
                    <div class="row-3cols">
                        <div class="form-group">
                            <label>Nome</label>
                            <input type="text" class="child-name" placeholder="Nome completo" required>
                        </div>
                        <div class="form-group">
                            <label>Idade (0-17)</label>
                            <input type="number" class="child-age" placeholder="Idade" min="0" max="17" required>
                        </div>
                        <div class="form-group">
                            <label>Sexo</label>
                            <select class="child-gender" required>
                                <option value="">Selecione</option>
                                <option>Feminino</option>
                                <option>Masculino</option>
                                <option>Nao informado</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" style="margin-top: 10px;">
                        <label>Data de nascimento</label>
                        <input type="date" class="child-birthdate" placeholder="Data de nascimento">
                    </div>
                </div>
            </div>

            <div class="btn-group">
                <button type="submit">Registrar ocorrencia</button>
                <button type="button" id="generatePdfBtn" class="btn-pdf">Gerar PDF</button>
            </div>
        </form>
        <div class="info-note">
            Dados internos - Relatorios disponiveis na aba Dashboard da planilha<br>
            Para multiplas criancas, clique em "Adicionar crianca" | PDF contem todas as informacoes preenchidas
        </div>
    </div>
</div>
<div id="toast" class="toast">Ocorrencia registrada com sucesso!</div>

<script>
    // Configuracao com o seu NOVO ID do Apps Script
    const SCRIPT_ID = 'AKfycbx9axjquomwxs_1PoFo5V-9O4FLBU_0i6x7-7jT_6ODrLV3unep5Pcg0DUKRaEsrNhweA';
    const GOOGLE_SCRIPT_URL = `https://script.google.com/macros/s/${SCRIPT_ID}/exec`;

    const form = document.getElementById('occurrenceForm');
    const toast = document.getElementById('toast');
    const childrenContainer = document.getElementById('childrenContainer');
    const addChildBtn = document.getElementById('addChildBtn');
    const generatePdfBtn = document.getElementById('generatePdfBtn');

    let childCount = 1;
    const MAX_CHILDREN = 5;

    // Preenche data atual automaticamente
    document.getElementById('date').valueAsDate = new Date();

    function showMessage(msg, isError = false) {
        toast.textContent = isError ? `Erro: ${msg}` : msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function getChildrenData() {
        const children = [];
        const childCards = document.querySelectorAll('.child-card');
        
        for (let card of childCards) {
            const name = card.querySelector('.child-name').value.trim();
            const age = card.querySelector('.child-age').value;
            const gender = card.querySelector('.child-gender').value;
            const birthdate = card.querySelector('.child-birthdate').value;
            
            if (name && age && gender) {
                children.push({ name, age, gender, birthdate });
            }
        }
        
        return children;
    }

    function validateChildren() {
        const children = getChildrenData();
        
        if (children.length === 0) {
            showMessage('Adicione pelo menos uma crianca', true);
            return false;
        }
        
        for (let i = 0; i < children.length; i++) {
            const child = children[i];
            if (!child.name) {
                showMessage(`Digite o nome da crianca ${i + 1}`, true);
                return false;
            }
            if (!child.age || child.age < 0 || child.age > 17) {
                showMessage(`Informe uma idade valida (0-17) para a crianca ${i + 1}`, true);
                return false;
            }
            if (!child.gender) {
                showMessage(`Selecione o sexo para a crianca ${i + 1}`, true);
                return false;
            }
        }
        
        return true;
    }

    function addChild() {
        if (childCount >= MAX_CHILDREN) {
            showMessage(`Maximo de ${MAX_CHILDREN} criancas por ocorrencia`, true);
            return;
        }
        
        const newIndex = childCount;
        const newChildCard = document.createElement('div');
        newChildCard.className = 'child-card';
        newChildCard.setAttribute('data-child-index', newIndex);
        newChildCard.innerHTML = `
            <div class="child-header">
                <span class="child-title">Crianca ${newIndex + 1}</span>
                <button type="button" class="btn-remove remove-child" style="width: auto; padding: 4px 12px;">Remover</button>
            </div>
            <div class="row-3cols">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" class="child-name" placeholder="Nome completo" required>
                </div>
                <div class="form-group">
                    <label>Idade (0-17)</label>
                    <input type="number" class="child-age" placeholder="Idade" min="0" max="17" required>
                </div>
                <div class="form-group">
                    <label>Sexo</label>
                    <select class="child-gender" required>
                        <option value="">Selecione</option>
                        <option>Feminino</option>
                        <option>Masculino</option>
                        <option>Nao informado</option>
                    </select>
                </div>
            </div>
            <div class="form-group" style="margin-top: 10px;">
                <label>Data de nascimento</label>
                <input type="date" class="child-birthdate" placeholder="Data de nascimento">
            </div>
        `;
        
        childrenContainer.appendChild(newChildCard);
        childCount++;
        
        const removeBtn = newChildCard.querySelector('.remove-child');
        removeBtn.addEventListener('click', function() {
            removeChild(newChildCard);
        });
    }

    function removeChild(childCard) {
        if (document.querySelectorAll('.child-card').length <= 1) {
            showMessage('Deve haver pelo menos uma crianca no atendimento', true);
            return;
        }
        childCard.remove();
        
        const remainingCards = document.querySelectorAll('.child-card');
        for (let i = 0; i < remainingCards.length; i++) {
            const title = remainingCards[i].querySelector('.child-title');
            title.textContent = `Crianca ${i + 1}`;
        }
        childCount = remainingCards.length;
    }

    function initRemoveButtons() {
        const removeButtons = document.querySelectorAll('.remove-child');
        removeButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                const childCard = this.closest('.child-card');
                removeChild(childCard);
            });
        });
    }

    addChildBtn.addEventListener('click', addChild);
    initRemoveButtons();

    function formatDateBR(dateString) {
        if (!dateString) return 'Nao informada';
        const [year, month, day] = dateString.split('-');
        return `${day}/${month}/${year}`;
    }

    function generatePDF() {
        // Coleta todos os dados do formulario
        const date = document.getElementById('date').value;
        const counselor = document.getElementById('counselor').value.trim();
        const guardian = document.getElementById('guardian').value.trim();
        const guardianBirthDate = document.getElementById('guardianBirthDate').value;
        const address = document.getElementById('address').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const occurrenceType = document.getElementById('occurrenceType').value;
        const notes = document.getElementById('notes').value.trim();
        const children = getChildrenData();

        // Validacoes basicas para o PDF
        if (!counselor) {
            showMessage('Digite o nome do conselheiro para gerar o PDF', true);
            return;
        }
        if (!guardian) {
            showMessage('Digite o nome do responsavel para gerar o PDF', true);
            return;
        }
        if (children.length === 0) {
            showMessage('Adicione pelo menos uma crianca para gerar o PDF', true);
            return;
        }

        // Abre uma nova janela para impressão
        const printWindow = window.open('', '_blank', 'width=800,height=600');
        
        // Gera o conteúdo HTML para impressão
        printWindow.document.write(`
            <!DOCTYPE html>
            <html>
            <head>
                <meta charset="UTF-8">
                <title>Ocorrencia - Conselho Tutelar</title>
                <style>
                    * {
                        margin: 0;
                        padding: 0;
                        box-sizing: border-box;
                    }
                    body {
                        font-family: 'Times New Roman', Arial, Helvetica, sans-serif;
                        padding: 20px;
                        color: #000;
                        line-height: 1.3;
                        font-size: 12px;
                    }
                    .container-print {
                        max-width: 100%;
                        margin: 0 auto;
                    }
                    h1 {
                        color: #0f3b5c;
                        text-align: center;
                        font-size: 20px;
                        margin-bottom: 5px;
                    }
                    .header {
                        text-align: center;
                        margin-bottom: 20px;
                        padding-bottom: 10px;
                        border-bottom: 2px solid #0f3b5c;
                    }
                    .subheader {
                        text-align: center;
                        font-size: 14px;
                        margin-top: 5px;
                    }
                    .protocol {
                        text-align: right;
                        font-size: 10px;
                        margin-bottom: 15px;
                    }
                    .section {
                        margin-bottom: 20px;
                        page-break-inside: avoid;
                    }
                    .section-title {
                        background: #e2e8f0;
                        padding: 6px 10px;
                        font-weight: bold;
                        font-size: 13px;
                        margin-bottom: 12px;
                        color: #0f3b5c;
                        border-left: 4px solid #0f3b5c;
                    }
                    .field-row {
                        display: flex;
                        margin-bottom: 8px;
                        font-size: 11px;
                        align-items: flex-start;
                    }
                    .field-label {
                        width: 180px;
                        font-weight: bold;
                        flex-shrink: 0;
                    }
                    .field-value {
                        flex: 1;
                        border-bottom: 1px dotted #ccc;
                        padding-bottom: 2px;
                    }
                    table {
                        width: 100%;
                        border-collapse: collapse;
                        margin-top: 10px;
                        font-size: 10px;
                    }
                    th, td {
                        border: 1px solid #000;
                        padding: 8px;
                        text-align: left;
                        vertical-align: top;
                    }
                    th {
                        background: #e2e8f0;
                        font-weight: bold;
                    }
                    .observations-box {
                        padding: 10px;
                        background: #f8fafc;
                        border: 1px solid #ccc;
                        border-radius: 5px;
                        font-size: 11px;
                        min-height: 80px;
                        white-space: pre-wrap;
                    }
                    .footer {
                        margin-top: 40px;
                        text-align: center;
                        font-size: 9px;
                        color: #666;
                        border-top: 1px solid #ccc;
                        padding-top: 15px;
                    }
                    .signature-area {
                        margin-top: 50px;
                        display: flex;
                        justify-content: space-between;
                        page-break-inside: avoid;
                    }
                    .signature {
                        width: 220px;
                        text-align: center;
                        font-size: 10px;
                    }
                    .signature-line {
                        border-top: 1px solid #000;
                        margin-top: 40px;
                        margin-bottom: 8px;
                        width: 100%;
                    }
                    @media print {
                        body {
                            padding: 0;
                            margin: 0;
                        }
                        .no-print {
                            display: none;
                        }
                    }
                </style>
            </head>
            <body>
                <div class="container-print">
                    <div class="header">
                        <h1>CONSELHO TUTELAR</h1>
                        <div class="subheader">REGISTRO DE OCORRENCIA</div>
                    </div>
                    
                    <div class="protocol">
                        Protocolo: ${new Date().getFullYear()}${String(new Date().getMonth() + 1).padStart(2, '0')}${String(new Date().getDate()).padStart(2, '0')}${String(Math.floor(Math.random() * 10000)).padStart(4, '0')}
                    </div>

                    <div class="section">
                        <div class="section-title">INFORMACOES DA OCORRENCIA</div>
                        <div class="field-row">
                            <div class="field-label">Data da ocorrencia:</div>
                            <div class="field-value">${formatDateBR(date)}</div>
                        </div>
                        <div class="field-row">
                            <div class="field-label">Conselheiro responsavel:</div>
                            <div class="field-value">${counselor}</div>
                        </div>
                        <div class="field-row">
                            <div class="field-label">Tipo de ocorrencia:</div>
                            <div class="field-value">${occurrenceType}</div>
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title">DADOS DO RESPONSAVEL</div>
                        <div class="field-row">
                            <div class="field-label">Nome completo:</div>
                            <div class="field-value">${guardian}</div>
                        </div>
                        <div class="field-row">
                            <div class="field-label">Data de nascimento:</div>
                            <div class="field-value">${guardianBirthDate ? formatDateBR(guardianBirthDate) : 'Nao informada'}</div>
                        </div>
                        <div class="field-row">
                            <div class="field-label">Endereco:</div>
                            <div class="field-value">${address || 'Nao informado'}</div>
                        </div>
                        <div class="field-row">
                            <div class="field-label">Telefone:</div>
                            <div class="field-value">${phone || 'Nao informado'}</div>
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title">CRIANCAS ENVOLVIDAS</div>
                        <table>
                            <thead>
                                <tr><th width="5%">#</th><th width="35%">Nome</th><th width="15%">Idade</th><th width="20%">Sexo</th><th width="25%">Data Nascimento</th></tr>
                            </thead>
                            <tbody>
                                ${children.map((child, index) => `
                                    <tr>
                                        <td>${index + 1}</td>
                                        <td>${child.name}</td>
                                        <td>${child.age} anos</td>
                                        <td>${child.gender}</td>
                                        <td>${child.birthdate ? formatDateBR(child.birthdate) : 'Nao informada'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>

                    ${notes ? `
                    <div class="section">
                        <div class="section-title">OBSERVACOES</div>
                        <div class="observations-box">
                            ${notes.replace(/\n/g, '<br>')}
                        </div>
                    </div>
                    ` : ''}

                    <div class="signature-area">
                        <div class="signature">
                            <div class="signature-line"></div>
                            <p>Conselheiro(a) responsavel</p>
                            <p style="font-size: 9px; margin-top: 5px;">${counselor}</p>
                        </div>
                        <div class="signature">
                            <div class="signature-line"></div>
                            <p>Responsavel legal</p>
                            <p style="font-size: 9px; margin-top: 5px;">${guardian}</p>
                        </div>
                    </div>

                    <div class="footer">
                        Documento gerado pelo Sistema do Conselho Tutelar em ${new Date().toLocaleString('pt-BR')}
                    </div>
                </div>
                
                <script>
                    window.onload = function() {
                        window.print();
                        window.onafterprint = function() {
                            window.close();
                        };
                    };
                <\/script>
            </body>
            </html>
        `);
        
        printWindow.document.close();
        showMessage('PDF gerado com sucesso! Verifique a janela que abriu.');
    }

    generatePdfBtn.addEventListener('click', generatePDF);

    async function submitToGoogleSheets(formData) {
        try {
            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams(formData)
            });
            return true;
        } catch (error) {
            console.error('Erro:', error);
            return false;
        }
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const counselor = document.getElementById('counselor').value.trim();
        const guardian = document.getElementById('guardian').value.trim();
        const guardianBirthDate = document.getElementById('guardianBirthDate').value;
        const address = document.getElementById('address').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const occurrenceType = document.getElementById('occurrenceType').value;
        
        if (!counselor) {
            showMessage('Digite o nome do conselheiro responsavel', true);
            return;
        }
        
        if (!guardian) {
            showMessage('Digite o nome do responsavel', true);
            return;
        }
        
        if (!occurrenceType) {
            showMessage('Selecione o tipo de ocorrencia', true);
            return;
        }
        
        if (!validateChildren()) {
            return;
        }
        
        const children = getChildrenData();
        
        const formData = {
            action: 'addRecord',
            timestamp: new Date().toISOString(),
            date: document.getElementById('date').value,
            counselor: counselor,
            guardian: guardian,
            guardianBirthDate: guardianBirthDate,
            address: address,
            phone: phone,
            occurrenceType: occurrenceType,
            notes: document.getElementById('notes').value.trim() || '',
            childrenCount: children.length,
            children: JSON.stringify(children)
        };
        
        children.forEach((child, index) => {
            formData[`child_${index}_name`] = child.name;
            formData[`child_${index}_age`] = child.age;
            formData[`child_${index}_gender`] = child.gender;
            formData[`child_${index}_birthdate`] = child.birthdate || '';
        });

        const success = await submitToGoogleSheets(formData);
        
        if (success) {
            showMessage('Ocorrencia registrada com sucesso!');
            form.reset();
            document.getElementById('date').valueAsDate = new Date();
            document.getElementById('notes').value = '';
            
            while (document.querySelectorAll('.child-card').length > 1) {
                const lastCard = document.querySelectorAll('.child-card')[document.querySelectorAll('.child-card').length - 1];
                lastCard.remove();
            }
            
            const firstCard = document.querySelector('.child-card');
            firstCard.querySelector('.child-name').value = '';
            firstCard.querySelector('.child-age').value = '';
            firstCard.querySelector('.child-gender').value = '';
            if (firstCard.querySelector('.child-birthdate')) {
                firstCard.querySelector('.child-birthdate').value = '';
            }
            
            childCount = 1;
        } else {
            showMessage('Erro ao registrar. Verifique sua conexao.', true);
        }
    });
</script>
</body>
</html>
